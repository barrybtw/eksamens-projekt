services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: ./AuthenticationServer
    ports:
      - "5110:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=authdb;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  dbgate:
    image: dbgate/dbgate:latest
    ports:
      - "8080:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      AUTH_SERVER_URL: http://auth-server:8080
      VITE_AUTH_SERVER_URL: http://localhost:5110
    depends_on:
      - auth-server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
