services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: ./AuthenticationServer
      dockerfile: Dockerfile.dev
    ports:
      - "5110:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=authdb;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    develop:
      watch:
        - action: sync
          path: ./AuthenticationServer
          target: /app
          ignore:
            - bin/
            - obj/
        - action: rebuild
          path: ./AuthenticationServer/AuthenticationServer.csproj

  dbgate:
    image: dbgate/dbgate:latest
    ports:
      - "8080:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVER_URL: http://auth-server:8080
      VITE_AUTH_SERVER_URL: http://localhost:5110
    depends_on:
      - auth-server
    networks:
      - app-network
    develop:
      watch:
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: sync+restart
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
